# Proxy /api/* → Render backend (must be before the SPA catch-all)
[[redirects]]
  from = "/api/*"
  to = "https://taiwan-stock-app-wso1.onrender.com/api/:splat"
  status = 200
  force = true

# SPA catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://taiwan-stock-app-wso1.onrender.com"
